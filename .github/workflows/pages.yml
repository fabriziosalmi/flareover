name: pages

# Deploy docs/ to GitHub Pages via Actions (replaces the built-in
# "deploy from a branch" builder, which has no concurrency control and raced
# itself into a 400 "deployment already in progress" on rapid pushes).
on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "website/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Serialize deploys: never start a second while one is in flight, and don't
# cancel the running one (a half-published site is worse than a short queue).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22 # Astro 7 requires Node >= 22.12
      # Build the Starlight docs site (base: /docs) from website/.
      - name: Build docs site
        working-directory: website
        run: |
          npm ci
          npm run build
      # Assemble the deploy artifact: the hand-rolled landing at the root
      # (index.html, assets, CNAME), the Starlight docs mounted at /docs/.
      - name: Assemble site
        run: |
          rm -rf _site && mkdir -p _site
          cp -R docs/. _site/
          mkdir -p _site/docs
          cp -R website/dist/. _site/docs/
      # Rasterize the Open Graph card to PNG (SVG OG images don't render on
      # LinkedIn/Slack). sharp is already installed by the docs build above.
      - name: Rasterize OG image
        run: node website/scripts/rasterize-og.mjs _site/og-image.png
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site # root = landing (+ CNAME → www.flareover.com); /docs = Starlight
      - id: deployment
        uses: actions/deploy-pages@v5
