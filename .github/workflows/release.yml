name: release

# Cut a release by pushing a semver tag:  git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the GitHub Release + upload assets
  id-token: write # Sigstore keyless signing (cosign OIDC)

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags for the changelog

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install syft (SBOM)
        uses: anchore/sbom-action/download-syft@v0

      - name: Install cosign (keyless signing)
        uses: sigstore/cosign-installer@v3

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Empty until you add the secret — GoReleaser then skips the Homebrew
          # upload instead of failing (see skip_upload in .goreleaser.yaml).
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
